name: billing_app
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  equatable: ^2.0.8

  # Functional Programming
  fpdart: ^1.2.0

  # Code Generation Annotations
  json_annotation: ^4.11.0

  # Navigation
  go_router: ^17.1.0

  # Database
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1

  # UI & Utilities
  google_fonts: ^8.0.2
  flutter_vibrate: ^1.4.0
  intl: ^0.20.2
  permission_handler: ^12.0.1

  # Scanner & Printer
  pretty_qr_code: ^3.6.0
  print_bluetooth_thermal: ^1.1.9
  mobile_scanner: ^7.2.0
  bloc: ^9.2.0
  uuid: ^4.5.3
  app_settings: ^7.0.0
  fl_chart: ^1.1.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  csv: ^7.2.0
  file_picker: ^10.3.10
  dio: ^5.9.0
  retrofit: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Code Generation
  build_runner: ^2.12.2
  drift_dev: ^2.32.0
  json_serializable: ^6.13.0
  retrofit_generator: ^10.0.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
