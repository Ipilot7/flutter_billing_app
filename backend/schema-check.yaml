      description: |-
        * `pending` - Pending
        * `applied` - Applied
        * `failed` - Failed
    SyncPullData:
      type: object
      properties:
        products:
          type: array
          items:
            type: object
            additionalProperties: {}
        categories:
          type: array
          items:
            type: object
            additionalProperties: {}
        shifts:
          type: array
          items:
            type: object
            additionalProperties: {}
        sales:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - categories
      - products
      - sales
      - shifts
    SyncPullResponse:
      type: object
      properties:
        server_time:
          type: string
          format: date-time
        next_cursor:
          type: string
          format: date-time
        data:
          $ref: '#/components/schemas/SyncPullData'
      required:
      - data
      - next_cursor
      - server_time
    SyncPushErrorItem:
      type: object
      properties:
        operation:
          type: object
          additionalProperties: {}
        error:
          type: string
      required:
      - error
      - operation
    SyncPushOperation:
      type: object
      properties:
        operation_id:
          type: string
        entity_type:
          type: string
        entity_id:
          type: string
        payload:
          type: object
          additionalProperties: {}
      required:
      - entity_type
      - operation_id
    SyncPushRequest:
      type: object
      properties:
        terminal_id:
          type: integer
        operations:
          type: array
          items:
            $ref: '#/components/schemas/SyncPushOperation'
      required:
      - operations
      - terminal_id
    SyncPushResponse:
      type: object
      properties:
        applied:
          type: array
          items:
            type: string
        duplicates:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: '#/components/schemas/SyncPushErrorItem'
        server_time:
          type: string
          format: date-time
      required:
      - applied
      - duplicates
      - failed
      - server_time
    Terminal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        device_id:
          type: string
          maxLength: 255
        is_active:
          type: boolean
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        store:
          type: integer
      required:
      - created_at
      - device_id
      - id
      - name
      - store
    TerminalInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        device_id:
          type: string
        store_id:
          type: integer
      required:
      - device_id
      - id
      - name
      - store_id
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenPair:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
      required:
      - access
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        role:
          $ref: '#/components/schemas/RoleEnum'
        organization:
          type: integer
          nullable: true
        store:
          type: integer
          nullable: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
      required:
      - id
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: Authentication
  description: Owner/cashier auth and JWT operations.
- name: Accounts
  description: User/account management.
- name: Tenancy
  description: Organizations, stores and terminals.
- name: Catalog
  description: Products and categories.
- name: Sales
  description: Shifts, sales and sale items.
- name: Synchronization
  description: Push/pull and sync operations.
- name: Billing
  description: Billing/subscription events.
- name: Other
  description: Unclassified endpoints.
