components:
  schemas:
    CashRegisterRegistration:
      type: object
      properties:
        store_id:
          type: integer
        terminal_name:
          type: string
          maxLength: 100
        device_id:
          type: string
          maxLength: 255
        cashier_username:
          type: string
          maxLength: 150
        cashier_password:
          type: string
          writeOnly: true
          minLength: 8
        cashier_pin:
          type: string
          maxLength: 10
        cashier_first_name:
          type: string
          maxLength: 150
        cashier_last_name:
          type: string
          maxLength: 150
      required:
      - cashier_password
      - cashier_username
      - device_id
      - store_id
      - terminal_name
    CashRegisterRegistrationResponse:
      type: object
      properties:
        terminal:
          $ref: '#/components/schemas/TerminalInfo'
        cashier:
          $ref: '#/components/schemas/User'
      required:
      - cashier
      - terminal
    CashierTerminalLogin:
      type: object
      properties:
        device_id:
          type: string
          maxLength: 255
        cashier_pin:
          type: string
          maxLength: 10
      required:
      - cashier_pin
      - device_id
    CashierTerminalLoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        terminal:
          $ref: '#/components/schemas/TerminalInfo'
        store:
          $ref: '#/components/schemas/StoreInfo'
        tokens:
          $ref: '#/components/schemas/TokenPair'
      required:
      - store
      - terminal
      - tokens
      - user
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        created_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
      required:
      - created_at
      - id
      - name
      - organization
    Organization:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        subscription_status:
          $ref: '#/components/schemas/SubscriptionStatusEnum'
        subscription_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    OrganizationInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
      - id
      - name
    PatchedCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        created_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
    PatchedOrganization:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        subscription_status:
          $ref: '#/components/schemas/SubscriptionStatusEnum'
        subscription_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedProduct:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        sku:
          type: string
          maxLength: 80
        barcode:
          type: string
          maxLength: 120
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        stock:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
        min_stock:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
        is_active:
          type: boolean
        updated_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
        category:
          type: integer
          nullable: true
    PatchedSale:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleItem'
          readOnly: true
        receipt_number:
          type: string
          maxLength: 50
        payment_type:
          $ref: '#/components/schemas/PaymentTypeEnum'
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        discount_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        is_return:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
          readOnly: true
        store:
          type: integer
          readOnly: true
        terminal:
          type: integer
          readOnly: true
        shift:
          type: integer
        created_by:
          type: integer
          readOnly: true
        parent_sale:
          type: integer
          nullable: true
    PatchedShift:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        start_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        end_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        status:
          $ref: '#/components/schemas/ShiftStatusEnum'
        opened_at:
          type: string
          format: date-time
          readOnly: true
        closed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        organization:
          type: integer
          readOnly: true
        store:
          type: integer
          readOnly: true
        terminal:
          type: integer
        opened_by:
          type: integer
          readOnly: true
        closed_by:
          type: integer
          readOnly: true
          nullable: true
    PatchedStore:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        timezone:
          type: string
          maxLength: 64
        address:
          type: string
          maxLength: 500
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
    PatchedSyncOperation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        operation_id:
          type: string
          format: uuid
        entity_type:
          type: string
          maxLength: 100
        entity_id:
          type: string
          maxLength: 100
        payload: {}
        status:
          $ref: '#/components/schemas/SyncOperationStatusEnum'
        error:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        processed_at:
          type: string
          format: date-time
          nullable: true
        terminal:
          type: integer
    PatchedTerminal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        device_id:
          type: string
          maxLength: 255
        is_active:
          type: boolean
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        store:
          type: integer
    PaymentTypeEnum:
      enum:
      - cash
      - card
      - terminal
      type: string
      description: |-
        * `cash` - Cash
        * `card` - Card
        * `terminal` - Terminal
    PlatformRegistration:
      type: object
      properties:
        organization_name:
          type: string
          maxLength: 255
        store_name:
          type: string
          maxLength: 255
        timezone:
          type: string
          default: UTC
          maxLength: 64
        address:
          type: string
          maxLength: 500
        owner_username:
          type: string
          maxLength: 150
        owner_password:
          type: string
          writeOnly: true
          minLength: 8
        owner_email:
          type: string
          format: email
        owner_first_name:
          type: string
          maxLength: 150
        owner_last_name:
          type: string
          maxLength: 150
      required:
      - organization_name
      - owner_password
      - owner_username
      - store_name
    PlatformRegistrationResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/OrganizationInfo'
        store:
          $ref: '#/components/schemas/StoreInfo'
        tokens:
          $ref: '#/components/schemas/TokenPair'
      required:
      - organization
      - store
      - tokens
      - user
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        sku:
          type: string
          maxLength: 80
        barcode:
          type: string
          maxLength: 120
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        stock:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
        min_stock:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
        is_active:
          type: boolean
        updated_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
        category:
          type: integer
          nullable: true
      required:
      - barcode
      - id
      - name
      - organization
      - price
      - updated_at
    ProviderEnum:
      enum:
      - stripe
      - store
      type: string
      description: |-
        * `stripe` - Stripe
        * `store` - Store Billing
    RoleEnum:
      enum:
      - owner
      - manager
      - cashier
      type: string
      description: |-
        * `owner` - Owner
        * `manager` - Manager
        * `cashier` - Cashier
    Sale:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleItem'
          readOnly: true
        receipt_number:
          type: string
          maxLength: 50
        payment_type:
          $ref: '#/components/schemas/PaymentTypeEnum'
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        discount_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        is_return:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
          readOnly: true
        store:
          type: integer
          readOnly: true
        terminal:
          type: integer
          readOnly: true
        shift:
          type: integer
        created_by:
          type: integer
          readOnly: true
        parent_sale:
          type: integer
          nullable: true
      required:
      - created_at
      - created_by
      - id
      - items
      - organization
      - payment_type
      - receipt_number
      - shift
      - store
      - subtotal
      - terminal
      - total
    SaleCreate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        shift:
          type: integer
        receipt_number:
          type: string
          maxLength: 50
        payment_type:
          $ref: '#/components/schemas/PaymentTypeEnum'
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleCreateItemInput'
      required:
      - id
      - items
      - payment_type
      - receipt_number
      - shift
    SaleCreateItemInput:
      type: object
      properties:
        product_id:
          type: integer
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        discount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          default: '0.00'
      required:
      - product_id
      - quantity
    SaleItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_name:
          type: string
          maxLength: 200
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        discount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        line_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        sale:
          type: integer
        product:
          type: integer
      required:
      - id
      - line_total
      - price
      - product
      - product_name
      - quantity
      - sale
    Shift:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        start_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        end_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        status:
          $ref: '#/components/schemas/ShiftStatusEnum'
        opened_at:
          type: string
          format: date-time
          readOnly: true
        closed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        organization:
          type: integer
          readOnly: true
        store:
          type: integer
          readOnly: true
        terminal:
          type: integer
        opened_by:
          type: integer
          readOnly: true
        closed_by:
          type: integer
          readOnly: true
          nullable: true
      required:
      - closed_at
      - closed_by
      - id
      - opened_at
      - opened_by
      - organization
      - start_balance
      - store
      - terminal
    ShiftStatusEnum:
      enum:
      - open
      - closed
      type: string
      description: |-
        * `open` - Open
        * `closed` - Closed
    Store:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        timezone:
          type: string
          maxLength: 64
        address:
          type: string
          maxLength: 500
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        organization:
          type: integer
      required:
      - created_at
      - id
      - name
      - organization
      - updated_at
    StoreInfo:
