          $ref: '#/components/schemas/ProviderEnum'
        event_type:
          type: string
          maxLength: 120
        raw_payload: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        processed_at:
          type: string
          format: date-time
          nullable: true
        organization:
          type: integer
      required:
      - created_at
      - event_type
      - id
      - organization
      - provider
    SubscriptionStatusEnum:
      enum:
      - trial
      - active
      - past_due
      - canceled
      type: string
      description: |-
        * `trial` - Trial
        * `active` - Active
        * `past_due` - Past Due
        * `canceled` - Canceled
    SyncOperation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        operation_id:
          type: string
          format: uuid
        entity_type:
          type: string
          maxLength: 100
        entity_id:
          type: string
          maxLength: 100
        payload: {}
        status:
          $ref: '#/components/schemas/SyncOperationStatusEnum'
        error:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        processed_at:
          type: string
          format: date-time
          nullable: true
